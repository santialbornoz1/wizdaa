version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/timeoff.db
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./data:/app/data
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
